name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          GITHUB_PAGES: 'true'
          VITE_FIREBASE_API_KEY: AIzaSyDZBhnV4xRjsH3c4cyBNN3EyFwPJ4OufD4
          VITE_FIREBASE_AUTH_DOMAIN: pwafinancasmobile.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: pwafinancasmobile
          VITE_FIREBASE_STORAGE_BUCKET: pwafinancasmobile.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: '886526920471'
          VITE_FIREBASE_APP_ID: 1:886526920471:web:d607609e359601ae93d952
        run: npm run build

      - name: Copy index.html to 404.html (SPA routing)
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
